services:
  rocky10build:
    volumes:
      - rpm10rocky:/home/centos/rpmbuild/RPMS
      - ccache10rocky:/home/centos/.ccache
    build:
      context: .
      args:
        os: $RL10
  rocky10buildreloc:
    command: ["-ba", "--with", "relocation"]
    volumes:
      - rpm10rocky:/home/centos/rpmbuild/RPMS
      - ccache10rocky:/home/centos/.ccache
    build:
      context: .
      args:
        os: $RL10

volumes:
  rpm10rocky:
    name: rpm10rocky
  ccache10rocky:
    name: ccache10rocky
